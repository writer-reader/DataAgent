<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DataAgent — AI 数据分析师</title>
<style>
  /* ============ 基础布局 ============ */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117; --panel: #1a1d27; --panel2: #232733;
    --text: #e2e5ec; --dim: #8b90a0; --accent: #7c6cf0;
    --green: #4ade80; --red: #f87171; --border: #2e3342;
    --mono: ui-monospace, "Cascadia Code", Consolas, monospace;
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    height: 100vh; display: flex; flex-direction: column;
  }
  header {
    padding: 14px 24px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  header .logo { color: var(--accent); font-weight: 700; font-size: 18px; }
  header .sub { color: var(--dim); font-size: 13px; }

  /* ============ 消息区 ============ */
  #messages {
    flex: 1; overflow-y: auto; padding: 24px;
    display: flex; flex-direction: column; gap: 16px;
    max-width: 900px; width: 100%; margin: 0 auto;
  }
  .msg { max-width: 85%; line-height: 1.6; font-size: 14.5px; }
  .msg.user {
    align-self: flex-end; background: var(--accent); color: #fff;
    padding: 10px 16px; border-radius: 16px 16px 4px 16px;
  }
  .msg.assistant { align-self: flex-start; width: 85%; }
  .msg.assistant .thinking { color: var(--dim); white-space: pre-wrap; }

  /* ============ 工具调用卡片 ============ */
  .tool-card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; margin: 6px 0; font-size: 13px; overflow: hidden;
  }
  .tool-card summary {
    padding: 8px 12px; cursor: pointer; color: var(--dim);
    display: flex; align-items: center; gap: 8px; user-select: none;
  }
  .tool-card summary::marker { content: ""; }
  .tool-card summary .tname { color: var(--accent); font-family: var(--mono); }
  .tool-card summary .spin {
    width: 12px; height: 12px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .tool-card .body {
    padding: 8px 12px; border-top: 1px solid var(--border);
    font-family: var(--mono); font-size: 12px; color: var(--dim);
    white-space: pre-wrap; max-height: 260px; overflow-y: auto;
  }

  /* ============ 最终报告 ============ */
  .report {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; margin-top: 10px; overflow: hidden;
  }
  .report .narrative { padding: 16px; border-left: 3px solid var(--green); white-space: pre-wrap; }
  .report .tabs { display: flex; border-top: 1px solid var(--border); }
  .report .tabs button {
    background: none; border: none; color: var(--dim); padding: 10px 18px;
    cursor: pointer; font-size: 13px; border-bottom: 2px solid transparent;
  }
  .report .tabs button.active { color: var(--accent); border-bottom-color: var(--accent); }
  .report .pane { display: none; padding: 12px 16px; overflow-x: auto; }
  .report .pane.active { display: block; }
  .report pre.sql {
    font-family: var(--mono); font-size: 13px; color: #a5d6ff;
    white-space: pre-wrap; word-break: break-all;
  }
  .report table { border-collapse: collapse; width: 100%; font-size: 13px; }
  .report th, .report td {
    padding: 6px 12px; text-align: left; border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  .report th { color: var(--accent); position: sticky; top: 0; background: var(--panel); }
  .report .table-wrap { max-height: 380px; overflow: auto; }
  .report .toolbar {
    display: flex; gap: 8px; padding: 8px 16px; border-top: 1px solid var(--border);
    align-items: center;
  }
  .report .toolbar button {
    background: var(--panel2); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 5px 12px; font-size: 12.5px; cursor: pointer;
  }
  .report .toolbar button:hover { border-color: var(--accent); }
  .report .toolbar .rowcount { color: var(--dim); font-size: 12px; margin-left: auto; }

  .error-box {
    background: rgba(248,113,113,.1); border: 1px solid var(--red);
    color: var(--red); padding: 10px 14px; border-radius: 8px; font-size: 13.5px;
  }

  /* ============ 输入区 ============ */
  #input-bar {
    padding: 16px 24px 20px; border-top: 1px solid var(--border);
  }
  #input-form {
    max-width: 900px; margin: 0 auto; display: flex; gap: 10px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 8px 8px 8px 16px;
  }
  #input-form:focus-within { border-color: var(--accent); }
  #question {
    flex: 1; background: none; border: none; outline: none;
    color: var(--text); font-size: 14.5px; font-family: inherit; resize: none;
    padding: 8px 0; max-height: 120px;
  }
  #send {
    background: var(--accent); color: #fff; border: none; border-radius: 8px;
    padding: 0 20px; font-size: 14px; cursor: pointer; flex-shrink: 0;
  }
  #send:disabled { opacity: .4; cursor: not-allowed; }
  .suggestions {
    max-width: 900px; margin: 10px auto 0; display: flex; gap: 8px; flex-wrap: wrap;
  }
  .suggestions button {
    background: none; border: 1px solid var(--border); color: var(--dim);
    border-radius: 20px; padding: 6px 14px; font-size: 12.5px; cursor: pointer;
  }
  .suggestions button:hover { color: var(--accent); border-color: var(--accent); }
</style>
</head>
<body>

<header>
  <span class="logo">◆ DataAgent</span>
  <span class="sub">探索语义层 · 构建 SQL · 生成报告</span>
</header>

<div id="messages"></div>

<div id="input-bar">
  <form id="input-form">
    <textarea id="question" rows="1" placeholder="问一个数据问题，例如：各行业平均营收是多少？"></textarea>
    <button id="send" type="submit">发送</button>
  </form>
  <div class="suggestions" id="suggestions">
    <button>各行业分别有多少家公司？</button>
    <button>各部门的平均薪资是多少？</button>
    <button>按月费排名前 5 的账户</button>
    <button>哪些客户经理管理的账户最多？</button>
  </div>
</div>

<script>
/* =====================================================================
 * DataAgent 前端 — 消费 /api/chat 的 SSE 事件流
 *
 * 事件协议（与 app/agent/events.py 对应）:
 *   text        {delta}                       追加到"思考"文本
 *   tool_call   {name, arguments}             新建折叠工具卡片（转圈中）
 *   tool_result {name, output, truncated}     填充卡片内容、停止转圈
 *   report      {sql, csv_results, narrative} 渲染最终报告
 *   done / error                              结束 / 报错
 * ===================================================================== */

const messagesEl = document.getElementById('messages');
const form = document.getElementById('input-form');
const questionEl = document.getElementById('question');
const sendBtn = document.getElementById('send');

// 对话历史（OpenAI 格式），每次请求整体发给后端 => 后端无状态、天然多轮
const history = [];
let busy = false;

/* ---------- 小工具 ---------- */
const el = (tag, cls, text) => {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (text !== undefined) e.textContent = text;
  return e;
};
const scrollBottom = () => { messagesEl.scrollTop = messagesEl.scrollHeight; };

/* 极简 CSV 解析（够用：处理引号包裹与内嵌逗号/换行/双引号转义） */
function parseCSV(text) {
  const rows = [];
  let row = [], cell = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"') {
        if (text[i + 1] === '"') { cell += '"'; i++; }  // 转义的双引号
        else inQuotes = false;
      } else cell += c;
    } else if (c === '"') inQuotes = true;
    else if (c === ',') { row.push(cell); cell = ''; }
    else if (c === '\n') { row.push(cell); rows.push(row); row = []; cell = ''; }
    else if (c !== '\r') cell += c;
  }
  if (cell !== '' || row.length) { row.push(cell); rows.push(row); }
  return rows.filter(r => r.length > 1 || (r[0] && r[0].trim() !== ''));
}

/* ---------- 渲染: 最终报告（叙述 + SQL/表格 Tab + CSV 下载） ---------- */
function renderReport(container, report) {
  const box = el('div', 'report');
  box.appendChild(el('div', 'narrative', report.narrative));

  const rows = parseCSV(report.csv_results || '');
  const hasTable = rows.length > 1;

  // Tab 栏
  const tabs = el('div', 'tabs');
  const paneTable = el('div', 'pane active');
  const paneSql = el('div', 'pane');
  const tabBtns = [];
  const addTab = (label, pane, active) => {
    const b = el('button', active ? 'active' : '', label);
    b.onclick = () => {
      tabBtns.forEach(x => x.classList.remove('active'));
      [paneTable, paneSql].forEach(p => p.classList.remove('active'));
      b.classList.add('active'); pane.classList.add('active');
    };
    tabBtns.push(b); tabs.appendChild(b);
  };
  addTab(hasTable ? `结果 (${rows.length - 1} 行)` : '结果', paneTable, true);
  addTab('SQL', paneSql, false);

  // 结果表格
  if (hasTable) {
    const wrap = el('div', 'table-wrap');
    const table = el('table');
    const thead = el('thead'); const trh = el('tr');
    rows[0].forEach(h => trh.appendChild(el('th', '', h)));
    thead.appendChild(trh); table.appendChild(thead);
    const tbody = el('tbody');
    rows.slice(1).forEach(r => {
      const tr = el('tr');
      r.forEach(v => tr.appendChild(el('td', '', v)));
      tbody.appendChild(tr);
    });
    table.appendChild(tbody); wrap.appendChild(table); paneTable.appendChild(wrap);
  } else {
    paneTable.appendChild(el('div', '', '（无表格数据）'));
  }

  // SQL 面板
  const pre = el('pre', 'sql', report.sql || '（无 SQL）');
  paneSql.appendChild(pre);

  // 工具栏: 复制 SQL / 下载 CSV
  const toolbar = el('div', 'toolbar');
  const copyBtn = el('button', '', '复制 SQL');
  copyBtn.onclick = () => {
    navigator.clipboard.writeText(report.sql || '');
    copyBtn.textContent = '已复制 ✓';
    setTimeout(() => copyBtn.textContent = '复制 SQL', 1500);
  };
  toolbar.appendChild(copyBtn);
  if (hasTable) {
    const dlBtn = el('button', '', '下载 CSV');
    dlBtn.onclick = () => {
      const blob = new Blob(['﻿' + report.csv_results], { type: 'text/csv;charset=utf-8' });
      const a = el('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'dataagent-results.csv';
      a.click(); URL.revokeObjectURL(a.href);
    };
    toolbar.appendChild(dlBtn);
    toolbar.appendChild(el('span', 'rowcount', `${rows.length - 1} 行 × ${rows[0].length} 列`));
  }

  box.appendChild(tabs);
  box.appendChild(paneTable);
  box.appendChild(paneSql);
  box.appendChild(toolbar);
  container.appendChild(box);
}

/* ---------- 主流程: 发送问题, 消费 SSE ---------- */
async function ask(question) {
  if (busy) return;
  busy = true; sendBtn.disabled = true;
  document.getElementById('suggestions').style.display = 'none';

  // 用户气泡
  messagesEl.appendChild(el('div', 'msg user', question));
  history.push({ role: 'user', content: question });

  // assistant 容器: 思考文本 + 工具卡片流 + 最终报告
  const holder = el('div', 'msg assistant');
  const thinking = el('div', 'thinking');
  holder.appendChild(thinking);
  messagesEl.appendChild(holder);
  scrollBottom();

  let narrativeForHistory = '';
  let openCard = null;   // 当前转圈中的工具卡片（等待 tool_result 填充）

  // 事件分发表
  const handlers = {
    text: (d) => { thinking.textContent += d.delta; },

    tool_call: (d) => {
      const card = document.createElement('details');
      card.className = 'tool-card';
      const summary = el('summary');
      const spin = el('span', 'spin');
      summary.appendChild(spin);
      summary.appendChild(el('span', 'tname', d.name));
      const argsText = JSON.stringify(d.arguments);
      summary.appendChild(el('span', '', argsText.length > 80 ? argsText.slice(0, 80) + '…' : argsText));
      card.appendChild(summary);
      holder.appendChild(card);
      openCard = { card, spin };
    },

    tool_result: (d) => {
      if (!openCard) return;
      openCard.spin.remove();                       // 停止转圈
      const body = el('div', 'body');
      const out = typeof d.output === 'string' ? d.output : JSON.stringify(d.output, null, 2);
      body.textContent = out.length > 3000 ? out.slice(0, 3000) + '\n…' : out;
      openCard.card.appendChild(body);
      openCard = null;
    },

    report: (d) => {
      narrativeForHistory = d.narrative;
      renderReport(holder, d);
    },

    error: (d) => { holder.appendChild(el('div', 'error-box', d.message)); },
    done: () => {},
  };

  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history }),
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

    /* 手动解析 SSE 流（fetch + ReadableStream；EventSource 不支持 POST）
       SSE 块格式:  event: <type>\ndata: <json>\n\n
       注意: sse-starlette 用 \r\n 作为行分隔符，必须先归一化成 \n，
       否则 indexOf('\n\n') 永远找不到事件边界（曾导致"只发送不回复"的 bug） */
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      // 归一化 \r\n -> \n 后再找事件边界。每次对整个缓冲区做替换：
      // 即使 \r 和 \n 被拆在两个 chunk 里，拼接后本轮也能替换掉
      buf = (buf + decoder.decode(value, { stream: true })).replace(/\r\n/g, '\n');
      let idx;
      while ((idx = buf.indexOf('\n\n')) >= 0) {     // 完整事件块以空行结尾
        const block = buf.slice(0, idx); buf = buf.slice(idx + 2);
        let evType = 'message', data = '';
        for (const line of block.split('\n')) {
          if (line.startsWith('event:')) evType = line.slice(6).trim();
          else if (line.startsWith('data:')) data += line.slice(5).trim();
        }
        if (data && handlers[evType]) {
          try { handlers[evType](JSON.parse(data)); } catch (e) { console.warn('bad event', e, data); }
          scrollBottom();
        }
      }
    }
  } catch (e) {
    holder.appendChild(el('div', 'error-box', '请求失败: ' + e.message));
  }

  // 回答入历史（优先用报告叙述，其次思考文本）
  history.push({ role: 'assistant', content: narrativeForHistory || thinking.textContent || '(完成)' });
  busy = false; sendBtn.disabled = false;
  questionEl.focus();
  scrollBottom();
}

/* ---------- 输入交互 ---------- */
form.addEventListener('submit', (e) => {
  e.preventDefault();
  const q = questionEl.value.trim();
  if (q) { questionEl.value = ''; ask(q); }
});
questionEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {   // Enter 发送，Shift+Enter 换行
    e.preventDefault(); form.requestSubmit();
  }
});
document.getElementById('suggestions').addEventListener('click', (e) => {
  if (e.target.tagName === 'BUTTON') ask(e.target.textContent);
});
questionEl.focus();
</script>
</body>
</html>
